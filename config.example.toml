# friendly-ghost configuration
# Copy to /etc/friendly-ghost/config.toml and edit

[journal]
# Entries are matched as regex (auto-anchored). Plain names match exactly.
units = ["nginx", "sshd", "web-.*"]
priority = "err"  # emerg, alert, crit, err, warning, notice, info, debug
# Regex patterns to ignore (matched against message text). Optional.
# ignore_patterns = ["Connection reset by peer", "upstream timed out.*retrying"]

[email]
smtp_host = "mail.example.com"
smtp_port = 587
username = "alerts@example.com"
# Set password via environment variable: FRIENDLY_GHOST_SMTP_PASSWORD
from = "alerts@example.com"
to = ["admin@example.com"]
subject_prefix = "[friendly-ghost]"

[state]
cursor_file = "/var/lib/friendly-ghost/cursor"

# Optional: LLM-based anomaly detection
# When enabled, filtered log entries are sent to an OpenAI-compatible API
# for analysis. The LLM writes the email body directly.
# Set API key via environment variable: FRIENDLY_GHOST_LLM_API_KEY
#
# [llm]
# api_url = "https://generativelanguage.googleapis.com/v1beta/openai/chat/completions"
# model = "gemini-2.5-flash"
# system_prompt_file = "/etc/friendly-ghost/prompt.txt"
# temperature = 0.1
# max_tokens = 4096
